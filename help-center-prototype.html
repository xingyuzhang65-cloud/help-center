<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帮助中心 - ANSU 安速系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.8/dist/index.css" />
  <style>
    :root {
      --ans-blue: #1677ff;
      --ans-blue-deep: #0958d9;
      --ans-bg: #f3f6fb;
      --ans-sidebar: #f4f7f9;
      --ans-line: #e5eaf2;
      --ans-text: #1f2d3d;
      --ans-muted: #7a8797;
      --ans-green: #2fa66a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ans-text);
      background: var(--ans-bg);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    button, input, textarea { font: inherit; }

    #app { min-height: 100vh; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px minmax(0, 1fr);
    }

    /* ── Topbar ── */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 22px;
      background: #fff;
      border-bottom: 1px solid var(--ans-line);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #f24f43 0 48%, #f7aa2a 49% 100%);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-pill {
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--ans-line);
      border-radius: 999px;
      color: #526070;
      background: #fff;
    }

    /* ── Hall layout ── */
    .hall-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr);
      height: calc(100vh - 56px);
    }

    .panel-head {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 18px;
      background: #fff;
      border-bottom: 1px solid var(--ans-line);
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .panel-title small {
      color: var(--ans-muted);
      font-weight: 400;
    }

    .status-strip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #5f6b7a;
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ans-green);
    }

    .hall {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      background: #fff;
    }

    /* ── Help sidebar ── */
    .help-sidebar {
      min-height: 0;
      background: var(--ans-sidebar);
      border-right: 1px solid var(--ans-line);
      display: grid;
      grid-template-rows: 58px minmax(0, 1fr);
    }

    .help-title {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      font-size: 18px;
      font-weight: 700;
      border-bottom: 1px solid #e1e7ef;
    }

    .menu-tree {
      overflow: auto;
      padding: 10px 0 18px;
    }

    .menu-module { margin-bottom: 4px; }

    .module-btn, .doc-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: #344054;
      text-align: left;
      cursor: pointer;
    }

    .module-btn {
      height: 42px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 20px;
      align-items: center;
      gap: 7px;
      padding: 0 16px;
      font-weight: 600;
    }

    .module-btn:hover, .module-btn.is-open {
      color: var(--ans-blue);
      background: rgba(22, 119, 255, 0.08);
    }

    .doc-list { display: grid; }

    .doc-btn {
      min-height: 40px;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 0 12px 0 34px;
      color: #475569;
    }

    .doc-btn span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doc-btn:hover, .doc-btn.is-active {
      color: var(--ans-blue);
      background: #e7f1ff;
    }

    .doc-btn.is-active {
      border-right: 3px solid var(--ans-blue);
      font-weight: 700;
    }

    /* ── Content reader ── */
    .content-scroll {
      min-height: 0;
      height: calc(100vh - 110px);
      overflow: auto;
      scroll-behavior: smooth;
    }

    .reader-grid {
      width: min(100%, 1120px);
      min-height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 8fr) minmax(240px, 4fr);
      gap: 30px;
      padding: 28px 28px 56px;
    }

    .reader-main { min-width: 0; }

    .loading-card {
      min-height: 360px;
      display: grid;
      align-content: start;
      gap: 18px;
      padding-top: 20px;
    }

    .doc-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.28;
      font-weight: 800;
    }

    .meta {
      margin-top: 9px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--ans-muted);
      font-size: 13px;
    }

    .ai-card {
      margin: 22px 0 26px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      padding: 16px;
      border: 1px solid #cfe5ff;
      border-radius: 8px;
      background: #ebf5ff;
    }

    .ai-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--ans-blue);
    }

    .ai-card p {
      margin: 4px 0 0;
      color: #415166;
      line-height: 1.72;
    }

    .summary-label {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 7px;
      border-radius: 4px;
      color: #fff;
      background: var(--ans-blue);
      font-size: 12px;
      font-weight: 700;
    }

    .doc-section {
      scroll-margin-top: 18px;
      padding-bottom: 22px;
    }

    .doc-section h2 {
      margin: 0 0 12px;
      font-size: 19px;
      line-height: 1.35;
    }

    .doc-section p {
      margin: 0 0 12px;
      color: #344054;
      line-height: 1.85;
    }

    .doc-section ul {
      margin: 0 0 12px;
      padding-left: 20px;
      color: #344054;
      line-height: 1.85;
    }

    /* ── Outline ── */
    .outline-wrap { min-width: 0; }

    .outline {
      position: sticky;
      top: 20px;
      padding: 14px 0 14px 18px;
      border-left: 1px solid var(--ans-line);
    }

    .outline-title {
      margin-bottom: 10px;
      color: #667387;
      font-size: 13px;
      font-weight: 700;
    }

    .outline a {
      display: block;
      position: relative;
      padding: 8px 12px;
      color: #667387;
      text-decoration: none;
      border-radius: 6px;
      line-height: 1.38;
      cursor: pointer;
    }

    .outline a:hover, .outline a.is-active {
      color: var(--ans-blue);
      background: #eef6ff;
    }

    .outline a.is-active::before {
      content: "";
      position: absolute;
      left: -19px;
      top: 8px;
      width: 3px;
      height: calc(100% - 16px);
      border-radius: 999px;
      background: var(--ans-blue);
    }

    @media (max-width: 760px) {
      .hall { grid-template-columns: 1fr; }
      .help-sidebar { min-height: 320px; }
      .reader-grid { grid-template-columns: 1fr; padding: 20px; }
      .outline { position: static; border-left: 0; border-top: 1px solid var(--ans-line); padding: 14px 0 0; }
      .content-scroll { height: 620px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <!-- ── Topbar ── -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">A</span>
          <span>ANSU 安速系统 / 帮助中心</span>
        </div>
        <div class="header-actions">
          <el-input v-model="globalKeyword" :prefix-icon="Search" placeholder="全局搜索文档、部门、角色" style="width: 280px" clearable></el-input>
          <span class="user-pill"><el-icon><User /></el-icon> 天帆</span>
        </div>
      </header>

      <!-- ── Help center hall ── -->
      <section class="hall-panel">
        <div class="panel-head">
          <div class="panel-title">
            <el-icon><Reading /></el-icon>
            <span>用户帮助中心</span>
            <small>按部门剪枝、首次自动激活、异步正文、悬浮大纲</small>
          </div>
          <span class="status-strip"><i class="dot"></i> 最新更新时间：{{ latestUpdateTime }}</span>
        </div>

        <div class="hall">
          <!-- Sidebar -->
          <aside class="help-sidebar">
            <div class="help-title">
              <el-icon><Collection /></el-icon>
              <span>帮助中心</span>
            </div>
            <nav class="menu-tree" aria-label="帮助文档树状菜单">
              <div v-for="module in visibleModules" :key="module.moduleId" class="menu-module">
                <button class="module-btn" :class="{ 'is-open': openModuleId === module.moduleId }" @click="toggleModule(module.moduleId)">
                  <el-icon><component :is="module.iconComponent" /></el-icon>
                  <span>{{ module.moduleName }}</span>
                  <el-icon><ArrowDown v-if="openModuleId === module.moduleId" /><ArrowRight v-else /></el-icon>
                </button>
                <div v-show="openModuleId === module.moduleId" class="doc-list">
                  <button
                    v-for="doc in module.children"
                    :key="doc.docId"
                    class="doc-btn"
                    :class="{ 'is-active': activeDocId === doc.docId }"
                    @click="activateDoc(doc.docId)"
                  >
                    <el-icon><Document /></el-icon>
                    <span>{{ doc.fileName }}</span>
                  </button>
                </div>
              </div>
            </nav>
          </aside>

          <!-- Content reader -->
          <section ref="contentScrollRef" class="content-scroll" @scroll="onContentScroll">
            <div class="reader-grid">
              <article class="reader-main">
                <div v-if="docLoading" class="loading-card">
                  <el-skeleton :rows="8" animated />
                </div>
                <template v-else-if="activeDoc">
                  <h1 class="doc-title">{{ activeDoc.fileName }}</h1>
                  <div class="meta">
                    <span>最后修改时间：{{ activeDoc.updateTime }}</span>
                    <span>作者：{{ activeDoc.author }}</span>
                  </div>

                  <div class="ai-card">
                    <div class="ai-icon"><el-icon><MagicStick /></el-icon></div>
                    <div>
                      <span class="summary-label">AI 速览</span>
                      <p>{{ activeDoc.aiSummary }}</p>
                    </div>
                  </div>

                  <section
                    v-for="section in activeDoc.sections"
                    :id="section.id"
                    :key="section.id"
                    :ref="setSectionRef"
                    class="doc-section"
                    :data-section-id="section.id"
                  >
                    <h2>{{ section.title }}</h2>
                    <p v-for="paragraph in section.paragraphs" :key="paragraph">{{ paragraph }}</p>
                    <ul v-if="section.points">
                      <li v-for="point in section.points" :key="point">{{ point }}</li>
                    </ul>
                  </section>
                </template>
              </article>

              <aside class="outline-wrap">
                <div class="outline" aria-label="悬浮大纲">
                  <div class="outline-title">文档大纲</div>
                  <a
                    v-for="section in activeDoc?.sections || []"
                    :key="section.id"
                    :class="{ 'is-active': activeSectionId === section.id }"
                    @click="scrollToSection(section.id)"
                  >
                    {{ section.title }}
                  </a>
                </div>
              </aside>
            </div>
          </section>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.8/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script>
    const { createApp, computed, nextTick, onMounted, ref, watch } = Vue;
    const Icons = ElementPlusIconsVue;

                { id: "waybill-exception", title: "1.2 异常处理", paragraphs: ["异常处理区会展示异常来源、触发时间、当前负责人和处理建议。用户提交处理说明后，状态会从待处理变更为已处理。", "若同一运单重复触发异常，系统会保留历史轨迹，便于复盘处理效率。"] },
                { id: "waybill-faq", title: "1.3 常见问题", paragraphs: ["如客户反馈轨迹延迟，先核对最新轨迹更新时间，再联系渠道补充节点。若系统中 ETA 和客户口径不一致，以渠道最新回传为准。", "对于批量问题，可使用导出功能形成处理清单，并在完成后统一回填处理备注。"] }
              ]
            },
            {

              sections: [

                { id: "exception-assign", title: "二、责任分派", paragraphs: ["业务专员负责客户沟通，操作文员负责节点核实，管理人员负责超时督办。所有动作都需要进入日志。"] },

                { id: "receipt-writeoff", title: "二、余额核销", paragraphs: ["选择对应客户余额后执行核销，系统会同步更新客户账期和可用余额。"] },
                { id: "receipt-risk", title: "三、异常账款", paragraphs: ["金额不一致或凭证缺失时进入异常队列，需补充说明后再次提交审核。"] }
              ]
            }
          ]
        },
        {

          children: [
            {

              author: "天帆",
              uploadTime: "2026-05-18",

              operator: "天帆",

              customerVisible: false,
              aiSummary: "本文档说明角色字典、权限分配、可见范围配置与帮助文档授权之间的关系。",
              sections: [
                { id: "role-dict", title: "一、角色字典", paragraphs: ["角色字典由系统统一维护，帮助中心仅消费角色值，不再维护行政部门绑定关系。"] },
                { id: "role-permission", title: "二、权限授权", paragraphs: ["当文档设置为 ALL 时，全部用户可见；当设置为具体角色时，用户角色与文档角色存在交集即可访问。"] },
                { id: "role-pruning", title: "三、菜单剪枝", paragraphs: ["若一级分类下没有任何可见文档，该分类不会渲染，避免用户看到空目录。"] }
              ]
            }
          ]
        },
        {
          moduleId: "MOD_REPORT",
          moduleName: "数据分析部",
          iconComponent: "DataAnalysis",
          children: [
            {
              docId: "DOC_2026_005",
              fileName: "经营报表查看指南",
              author: "王思雨",
              uploadTime: "2026-04-28",
              updateTime: "2026-05-20",
              operator: "王思雨",
              departmentName: "数据分析部",
              visible_roles: ["admin"],
              customerVisible: false,
              aiSummary: "本文档仅管理员可见，用于说明经营报表的数据口径、筛选方式和导出策略。",
              sections: [
                { id: "report-scope", title: "一、数据口径", paragraphs: ["报表数据按业务日期聚合，支持按渠道、业务员、客户与模块维度切换。"] },
                { id: "report-export", title: "二、导出策略", paragraphs: ["导出前需要确认筛选条件，避免下载过大的明细数据。"] }
              ]

    const app = createApp({
      setup() {
        const globalKeyword = ref("");
        const currentUserRoles = ref(["business_specialist", "operation_clerk"]);
        const contentScrollRef = ref(null);
        const sectionRefs = ref([]);
        const activeDocId = ref("");
        const activeDoc = ref(null);
        const activeSectionId = ref("");
        const openModuleId = ref("");
        const docLoading = ref(false);

        const roleOptions = [
          { label: "业务专员", value: "business_specialist" },
          { label: "操作文员", value: "operation_clerk" },
          { label: "财务主管", value: "finance_manager" },
          { label: "系统管理员", value: "admin" }
        ];

        const latestUpdateTime = computed(() => {
          let latest = "";
          for (const module of mockResponse.data) {
            for (const doc of module.children) {
              if (doc.updateTime > latest) latest = doc.updateTime;
            }
          }
          if (!latest) return "";
          const now = new Date();
          const pad = (n) => String(n).padStart(2, "0");
          const [y, m, d] = latest.split("-");
          return `${y}年${m}月${d}日 ${pad(now.getHours())}时${pad(now.getMinutes())}分${pad(now.getSeconds())}秒`;
        });

        const visibleModules = computed(() => {
          const roles = currentUserRoles.value;
          return mockResponse.data
            .map(module => ({
              ...module,
              children: module.children.filter(doc =>
                doc.visible_roles.some(role => roles.includes(role))
              )
            }))
            .filter(module => module.children.length > 0);
        });

        function roleLabel(value) {
          return roleOptions.find(role => role.value === value)?.label || value;
        }

        function toggleModule(moduleId) {
          openModuleId.value = openModuleId.value === moduleId ? "" : moduleId;
        }

        function findDoc(docId) {
          for (const module of visibleModules.value) {
            const doc = module.children.find(item => item.docId === docId);
            if (doc) return { module, doc };
          }
          return null;
        }

        async function activateDoc(docId) {
          const result = findDoc(docId);
          if (!result) return;
          activeDocId.value = docId;
          openModuleId.value = result.module.moduleId;
          activeDoc.value = null;
          activeSectionId.value = "";
          docLoading.value = true;
          await new Promise(resolve => setTimeout(resolve, 420));
          activeDoc.value = result.doc;
          docLoading.value = false;
          sectionRefs.value = [];
          await nextTick();
          activeSectionId.value = result.doc.sections[0]?.id || "";
          if (contentScrollRef.value) contentScrollRef.value.scrollTop = 0;
        }

        function autoActivateFirstVisibleDoc() {
          const firstModule = visibleModules.value[0];
          const firstDoc = firstModule?.children?.[0];
          if (!firstDoc) return;
          openModuleId.value = firstModule.moduleId;
          activateDoc(firstDoc.docId);
        }

        function setSectionRef(el) {
          if (el && !sectionRefs.value.includes(el)) sectionRefs.value.push(el);
        }

        function onContentScroll() {
          if (!contentScrollRef.value || docLoading.value || !activeDoc.value) return;
          const containerTop = contentScrollRef.value.getBoundingClientRect().top;
          let current = activeDoc.value.sections[0]?.id || "";
          for (const el of sectionRefs.value) {
            const top = el.getBoundingClientRect().top - containerTop;
            if (top <= 84) current = el.dataset.sectionId;
          }
          activeSectionId.value = current;
        }

        function scrollToSection(sectionId) {
          const target = sectionRefs.value.find(el => el.dataset.sectionId === sectionId);
          if (!target || !contentScrollRef.value) return;
          contentScrollRef.value.scrollTo({
            top: target.offsetTop - 18,
            behavior: "smooth"
          });
        }

        onMounted(() => {
          setTimeout(() => autoActivateFirstVisibleDoc(), 260);
        });

        return {
          ...Icons,
          Search: Icons.Search,
          Plus: Icons.Plus,
          globalKeyword,
          currentUserRoles,
          contentScrollRef,
          activeDocId,
          activeDoc,
          activeSectionId,
          openModuleId,
          docLoading,
          roleOptions,
          latestUpdateTime,
          visibleModules,
          roleLabel,
          toggleModule,
          activateDoc,
          setSectionRef,
          onContentScroll,
          scrollToSection
        };
      }
    });

    Object.entries(Icons).forEach(([name, component]) => {
      app.component(name, component);
      app.component(name.toLowerCase(), component);
    });

    app.use(ElementPlus).mount("#app");
  </script>
</body>
</html>
